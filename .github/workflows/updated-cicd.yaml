name:  Deploy to AWS EC2 Production
run-name: Deploy to AWS EC2 Prod | by @${{ github.actor }}

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths-ignore:
    - '.github/**'

permissions:
  id-token: write
  contents: read
  
jobs:
  build_image_and_push:
    name: Build Image
    runs-on: ubuntu-latest
    steps:

      - name: Checkout
        uses: actions/checkout@v3

      # -------------------------------
      # Configure AWS credentials (OIDC or Access Keys)
      # -------------------------------
      - name: Configure AWS credentials (Access Keys)
        if: ${{ vars.ECR_AWS_ROLE_ARN == '' }}
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1
          mask-aws-account-id: true

      # -------------------------------
      # Configure AWS credentials (OIDC or Access Keys)
      # -------------------------------
      - name: Configure AWS credentials (OIDC)
        if: ${{ vars.ECR_AWS_ROLE_ARN != '' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.ECR_AWS_ROLE_ARN }}
          role-session-name: github-drift-detection-${{ github.run_id }}
          aws-region: us-east-1

      - name: Amazon ECR Login
        uses: aws-actions/amazon-ecr-login@v1.3.0

      - name: Set Environment Variables
        id: set-env-vars
        run: |
          echo "IMAGE_REGISTRY=621541294561.dkr.ecr.us-east-1.amazonaws.com" >> $GITHUB_ENV
          echo "SHORT_SHA=`echo ${GITHUB_SHA} | cut -c1-8`" >> $GITHUB_ENV

      - name: Extract branch name
        shell: bash
        run: |
          branch_name=$(echo ${GITHUB_REF#refs/heads/})
          echo "branch=${branch_name}" >> $GITHUB_OUTPUT
        id: extract_branch

      - name: Build and Push Docker Images
        env:
          IMAGE_TAG: ${{ steps.extract_branch.outputs.branch }}.${{ env.SHORT_SHA }}
        run: |
          cd frontend
          echo "Build image for frontend with tag $IMAGE_TAG"
          docker build -t "$IMAGE_REGISTRY/devops-todo:$IMAGE_TAG" -f frontend/Dockerfile .
          docker push "$IMAGE_REGISTRY/devops-todo:$IMAGE_TAG"
  
  Deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build_image_and_push]
    steps:
      - name: Install Dependencies
        run: |
          echo "Will deploy to Production ec2 later..."