name: Deploy to AWS EC2 Production
run-name: Deploy to AWS EC2 Prod | by @${{ github.actor }}

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths-ignore:
      - '.github/**'

permissions:
  id-token: write
  contents: read

jobs:
  # ------------------------------------------------------------
  # Detect which app folders actually changed in this push
  # ------------------------------------------------------------
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      services: ${{ steps.services.outputs.services }}
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Path filter
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - 'backend/**'
            frontend:
              - 'frontend/**'

      - name: Build services matrix
        id: services
        run: |
          services='[]'

          if [[ "${{ steps.filter.outputs.backend }}" == "true" ]]; then
            services=$(jq -c --arg service "backend" --arg dockerfile "backend/Dockerfile" --arg context "backend" '. + [{"service": $service, "dockerfile": $dockerfile, "context": $context}]' <<<"$services")
          fi

          if [[ "${{ steps.filter.outputs.frontend }}" == "true" ]]; then
            services=$(jq -c --arg service "frontend" --arg dockerfile "frontend/Dockerfile" --arg context "frontend" '. + [{"service": $service, "dockerfile": $dockerfile, "context": $context}]' <<<"$services")
          fi

          echo "services=${services}" >> "$GITHUB_OUTPUT"

  # ------------------------------------------------------------
  # Build/push changed images dynamically using a matrix
  # ------------------------------------------------------------
  build_images:
    name: Build ${{ matrix.service }} Image
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.services != '[]'
    strategy:
      matrix:
        include: ${{ fromJSON(needs.changes.outputs.services) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Configure AWS credentials (Access Keys)
        if: ${{ vars.ECR_AWS_ROLE_ARN == '' }}
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1
          mask-aws-account-id: true

      - name: Configure AWS credentials (OIDC)
        if: ${{ vars.ECR_AWS_ROLE_ARN != '' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.ECR_AWS_ROLE_ARN }}
          role-session-name: github-deploy-${{ matrix.service }}-${{ github.run_id }}
          aws-region: us-east-1

      - name: Amazon ECR Login
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v1.3.0

      - name: Set image tag vars
        run: |
          SHORT_SHA=$(echo "${GITHUB_SHA}" | cut -c1-8)
          BRANCH_NAME=$(echo "${GITHUB_REF#refs/heads/}")
          IMAGE_TAG="${{ matrix.service }}-${BRANCH_NAME}.${SHORT_SHA}"

          echo "IMAGE_TAG=${IMAGE_TAG}" >> "$GITHUB_ENV"

      - name: Build and Push Image
        env:
          IMAGE_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
        run: |
          echo "Build ${{ matrix.service }} image with tag $IMAGE_TAG"
          docker build -t "$IMAGE_REGISTRY/devops-todo:$IMAGE_TAG" \
            -f ${{ matrix.dockerfile }} \
            ${{ matrix.context }}
          docker push "$IMAGE_REGISTRY/devops-todo:$IMAGE_TAG"

  Deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [changes, build_images]
    # Run as long as neither build job hard-failed. A skipped build job
    # (because that folder didn't change) must not block deployment of the other.
    if: |
      always() &&
      !contains(needs.*.result, 'failure') &&
      !contains(needs.*.result, 'cancelled') &&
      (needs.changes.outputs.backend == 'true' || needs.changes.outputs.frontend == 'true')
    steps:

      - name: Checkout
        uses: actions/checkout@v3

      - name: Set deploy variables
        id: deploy-vars
        run: |
          SHORT_SHA=$(echo "${GITHUB_SHA}" | cut -c1-8)
          BRANCH_NAME=$(echo "${GITHUB_REF#refs/heads/}")
          echo "backend_tag=backend-${BRANCH_NAME}.${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "frontend_tag=frontend-${BRANCH_NAME}.${SHORT_SHA}" >> "$GITHUB_OUTPUT"

          ACCOUNT_ID=${{ secrets.AWS_ACCOUNT_ID }}
          echo "ecr_registry=${ACCOUNT_ID}.dkr.ecr.us-east-1.amazonaws.com" >> "$GITHUB_OUTPUT"


      - name: Deploy changed services on EC2
        env:
          DEPLOY_BACKEND: ${{ needs.changes.outputs.backend }}
          DEPLOY_FRONTEND: ${{ needs.changes.outputs.frontend }}
          BACKEND_TAG: ${{ steps.deploy-vars.outputs.backend_tag }}
          FRONTEND_TAG: ${{ steps.deploy-vars.outputs.frontend_tag }}
          ECR_REGISTRY: ${{ steps.deploy-vars.outputs.ecr_registry }}

        run: |

            sudo apt-get update && sudo apt-get install -y  gettext libintl-perl openssh-client  rsync 
            cd /home/${{ vars.REMOTE_USER }}/${{ vars.DOCKER_REMOTE_FOLDER }}
       
            SERVICES=()

            if [[ "${DEPLOY_BACKEND}" == "true" ]]; then
              upsert_env "BACKEND_IMAGE_TAG" "${BACKEND_TAG}"
              SERVICES+=("backend")
            fi

            if [[ "${DEPLOY_FRONTEND}" == "true" ]]; then
              upsert_env "FRONTEND_IMAGE_TAG" "${FRONTEND_TAG}"
              SERVICES+=("frontend")
            fi

            if [ ${#SERVICES[@]} -eq 0 ]; then
              echo "No services changed -> nothing to deploy."
              exit 0
            fi

            mkdir -p ./tosend
            cp -rvf ./remote-deploy/deploy.sh ./tosend/deploy.sh
            envsubst < ./remote-deploy/env.template > ./tosend/.env

            echo "Services to deploy: ${SERVICES[*]}"
            export ECR_LOGIN_COMMAND=$(aws ecr get-login --no-include-email --region $AWS_DEFAULT_REGION)
            echo $ECR_LOGIN_COMMAND > ./tosend/login.sh
            envsubst '${ECR_LOGIN_COMMAND} ${ENVIRONMENT}' < ./remote-deploy/deploy.sh > ./tosend/deploy.sh

            # ------------------------------------
            # Run deployment script for each changed service
            # ------------------------------------
            for SERVICE in "${SERVICES[@]}"; do
              bash deployment/deploy.sh "$SERVICE"
            done