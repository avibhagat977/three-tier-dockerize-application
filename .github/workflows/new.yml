name: Deploy to AWS EC2 Production
run-name: Deploy to AWS EC2 Prod | by @${{ github.actor }}

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths-ignore:
      - '.github/**'

permissions:
  id-token: write
  contents: read

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      services: ${{ steps.services.outputs.services }}
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Path filter
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - 'backend/**'
            frontend:
              - 'frontend/**'

      - name: Build services matrix
        id: services
        run: |
          services='[]'
          if [[ "${{ steps.filter.outputs.backend }}" == "true" ]]; then
            services=$(jq -c --arg service "backend" --arg dockerfile "backend/Dockerfile" --arg context "backend" '. + [{"service": $service, "dockerfile": $dockerfile, "context": $context}]' <<<"$services")
          fi
          if [[ "${{ steps.filter.outputs.frontend }}" == "true" ]]; then
            services=$(jq -c --arg service "frontend" --arg dockerfile "frontend/Dockerfile" --arg context "frontend" '. + [{"service": $service, "dockerfile": $dockerfile, "context": $context}]' <<<"$services")
          fi
          echo "services=${services}" >> "$GITHUB_OUTPUT"

  build_images:
    name: Build ${{ matrix.service }} Image
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.services != '[]'
    strategy:
      matrix:
        include: ${{ fromJSON(needs.changes.outputs.services) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Configure AWS credentials (Access Keys)
        if: ${{ vars.ECR_AWS_ROLE_ARN == '' }}
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1
          mask-aws-account-id: true

      - name: Configure AWS credentials (OIDC)
        if: ${{ vars.ECR_AWS_ROLE_ARN != '' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.ECR_AWS_ROLE_ARN }}
          role-session-name: github-deploy-${{ matrix.service }}-${{ github.run_id }}
          aws-region: us-east-1

      - name: Amazon ECR Login
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v1.3.0

      - name: Set image tag vars
        run: |
          SHORT_SHA=$(echo "${GITHUB_SHA}" | cut -c1-8)
          BRANCH_NAME=$(echo "${GITHUB_REF#refs/heads/}")
          IMAGE_TAG="${{ matrix.service }}-${BRANCH_NAME}.${SHORT_SHA}"
          echo "IMAGE_TAG=${IMAGE_TAG}" >> "$GITHUB_ENV"

      - name: Build and Push Image
        env:
          IMAGE_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
        run: |
          echo "Build ${{ matrix.service }} image with tag $IMAGE_TAG"
          docker build -t "$IMAGE_REGISTRY/devops-todo:$IMAGE_TAG" \
            -f ${{ matrix.dockerfile }} \
            ${{ matrix.context }}
          docker push "$IMAGE_REGISTRY/devops-todo:$IMAGE_TAG"

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [changes, build_images]
    if: |
      always() &&
      !contains(needs.*.result, 'failure') &&
      !contains(needs.*.result, 'cancelled') &&
      (needs.changes.outputs.backend == 'true' || needs.changes.outputs.frontend == 'true')
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set deploy variables
        id: deploy-vars
        run: |
          SHORT_SHA=$(echo "${GITHUB_SHA}" | cut -c1-8)
          BRANCH_NAME=$(echo "${GITHUB_REF#refs/heads/}")
          echo "backend_tag=backend-${BRANCH_NAME}.${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "frontend_tag=frontend-${BRANCH_NAME}.${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "ecr_registry=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com" >> "$GITHUB_OUTPUT"

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ vars.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Prepare deployment files
        id: prepare
        run: |
          mkdir -p ./deploy-temp
          
          # Copy deployment scripts
          cp -rvf $GITHUB_WORKSPACE/remote-deploy/deploy.sh ./deploy-temp/deploy.sh
          chmod +x ./deploy-temp/deploy.sh
          
          # Generate .env file with proper substitutions
          export BACKEND_TAG="${{ steps.deploy-vars.outputs.backend_tag }}"
          export FRONTEND_TAG="${{ steps.deploy-vars.outputs.frontend_tag }}"
          export ECR_REGISTRY="${{ steps.deploy-vars.outputs.ecr_registry }}"
          export AWS_DEFAULT_REGION="us-east-1"
          export FRONTEND_PORT="${{ vars.FRONTEND_PORT }}"
          
          # Use envsubst on template
          envsubst < $GITHUB_WORKSPACE/remote-deploy/env.template > ./deploy-temp/.env
          
          # Copy docker-compose
          cp -f "$GITHUB_WORKSPACE/remote-deploy/docker-compose.yml" ./deploy-temp/docker-compose.yml
          
          # Determine which services to deploy
          SERVICES=""
          if [[ "${{ needs.changes.outputs.backend }}" == "true" ]]; then
            SERVICES="${SERVICES} backend"
          fi
          if [[ "${{ needs.changes.outputs.frontend }}" == "true" ]]; then
            SERVICES="${SERVICES} frontend"
          fi
          echo "services=${SERVICES}" >> "$GITHUB_OUTPUT"

      - name: Deploy to EC2
        env:
          SERVICES: ${{ steps.prepare.outputs.services }}
        run: |
          # Copy files to EC2
          scp -i ~/.ssh/id_rsa -r ./deploy-temp/* ${{ vars.REMOTE_USER }}@${{ vars.EC2_HOST }}:${{ vars.DOCKER_REMOTE_FOLDER }}/
          
          # Execute deployment on EC2
          ssh -i ~/.ssh/id_rsa ${{ vars.REMOTE_USER }}@${{ vars.EC2_HOST }} << EOF
            cd ${{ vars.DOCKER_REMOTE_FOLDER }}
            
            # Login to ECR
            aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin ${{ steps.deploy-vars.outputs.ecr_registry }}
            
            # Deploy each changed service
            for SERVICE in ${SERVICES}; do
              echo "Deploying service: \$SERVICE"
              chmod +x deploy.sh
              ./deploy.sh "\$SERVICE"
            done
            
            # Clean up old images
            docker image prune -f
          EOF

      - name: Cleanup
        if: always()
        run: |
          rm -rf ./deploy-temp
          rm -f ~/.ssh/id_rsa